# Hermes Box's shared interactive session.
set -g default-terminal "tmux-256color"
set -as terminal-features ',xterm*:RGB'
set -as terminal-features ',xterm*:extkeys'
# Refresh terminal identity when a later SSH client attaches to this long-lived
# server instead of retaining only the values from its first client.
set -ag update-environment ' COLORTERM TERM_PROGRAM TERM_PROGRAM_VERSION'
set -g focus-events on
set -g mouse on
set -g set-clipboard on
# "on" limits passthrough to a visible pane; "all" would include hidden panes.
set -g allow-passthrough on
set -s escape-time 10
set -s extended-keys always

# CSI-u output is available in tmux 3.5+. Keep the file parseable when an old
# restored root still provides tmux 3.4.
%if "#{>=:#{version},3.5}"
set -s extended-keys-format csi-u
%endif

set -g status on
set -g status-position bottom
set -g status-style 'bg=#006400,fg=white'
set -g window-status-style 'bg=#006400,fg=white'
set -g window-status-current-style 'bg=#006400,fg=white,bold,underscore'
