name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Install static-check tools
        run: sudo apt-get update && sudo apt-get install -y shellcheck tmux
      - name: Check
        run: make check

  macos-arm64:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - name: Verify native ARM64 runner
        run: test "$(uname -m)" = arm64
      - name: Install static-check tools
        run: brew install shellcheck tmux
      - name: Check the complete supported-host suite
        env:
          CGO_ENABLED: "1"
        run: make check
